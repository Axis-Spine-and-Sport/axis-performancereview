<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Axis Spine and Sport — Clinic Quarterly Review</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:#eef0f2;min-height:100vh}
input,select,textarea,button{font-family:'Montserrat',sans-serif}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#eef0f2}
::-webkit-scrollbar-thumb{background:#c3cace;border-radius:3px}
.header{background:linear-gradient(135deg,#000 0%,#1a1a1a 70%,#222 100%)}
.gold-bar{height:4px;background:linear-gradient(90deg,#e5be5e,#f5e6b8,#e5be5e)}
.header-inner{max-width:900px;margin:0 auto;padding:20px 20px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo-wrap{display:flex;align-items:center;gap:14px}
.logo-box{width:44px;height:44px;border-radius:10px;background:#000;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(229,190,94,.27);border:1px solid rgba(229,190,94,.27);flex-shrink:0}
.header h1{font-size:22px;font-weight:800;margin:0;line-height:1.2;color:#fff}
.header-sub{font-size:11px;color:#c3cace;margin:2px 0 0;font-weight:400;letter-spacing:.5px}
.body{max-width:900px;margin:0 auto;padding:24px 20px;display:flex;flex-direction:column;gap:20px}
.card{background:#fff;border-radius:12px;border:1px solid #c3cace;padding:24px}
.card-dark{background:#1a1a1a;border-radius:12px;border:1px solid #333;padding:24px}
.section-title{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:#1a1a1a;display:flex;align-items:center;margin-bottom:16px}
.sbadge{width:26px;height:26px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;margin-right:10px;flex-shrink:0}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.narr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.rating-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
label.lbl{display:block;font-size:11px;font-weight:600;color:#767b7f;margin-bottom:4px;letter-spacing:.3px;text-transform:uppercase}
.field{width:100%;border:1px solid #c3cace;border-radius:6px;padding:8px 10px;font-size:13px;outline:none;color:#000;background:#fff}
.field:focus{border-color:#e5be5e}
textarea.field{resize:vertical}
.field-locked{width:100%;border:1px solid rgba(229,190,94,.3);border-radius:6px;padding:8px 10px;font-size:13px;background:rgba(229,190,94,.07);color:#1a1a1a;font-weight:700;min-height:36px;display:flex;align-items:center}
.tbl-wrap{overflow-x:auto;margin-top:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;font-size:11px;font-weight:600;color:#767b7f;letter-spacing:.4px;text-transform:uppercase;border-bottom:2px solid #c3cace;background:#eef0f2}
td{padding:9px 12px;border-bottom:1px solid #eef0f2;vertical-align:middle}
tr:last-child td{border-bottom:none}
.target-pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:#c9a23e}
.target-dot{width:6px;height:6px;border-radius:3px;background:#e5be5e;flex-shrink:0}
.pct-cell{font-size:12px;font-weight:700;padding:3px 8px;border-radius:4px;display:inline-block;min-width:48px;text-align:center}
.pct-ni{background:#fde8e8;color:#b91c1c;border:1px solid #f5a3a3}
.pct-me{background:#f5e6b8;color:#c9a23e;border:1px solid #e5be5e}
.pct-ex{background:#e6f4ea;color:#1a7a3a;border:1px solid #a8d5b8}
.pct-el{background:#1a1a1a;color:#e5be5e;border:1px solid #e5be5e}
.pct-none{background:#eef0f2;color:#767b7f;border:1px solid #c3cace}
.status-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;display:inline-block;white-space:nowrap}
.badge-ni{background:#fde8e8;color:#b91c1c;border:1px solid #f5a3a3}
.badge-me{background:#f5e6b8;color:#c9a23e;border:1px solid #e5be5e}
.badge-ex{background:#e6f4ea;color:#1a7a3a;border:1px solid #a8d5b8}
.badge-el{background:#1a1a1a;color:#e5be5e;border:1px solid #e5be5e}
.badge-none{background:#eef0f2;color:#767b7f;border:1px solid #c3cace}
.kpi-pill{font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px}
.rating-btn{padding:14px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;text-align:center;border:2px solid #c3cace;background:#fff;color:#767b7f;width:100%;line-height:1.4}
.rating-btn.sel-ni{background:#fde8e8;color:#b91c1c;border-color:#f5a3a3;box-shadow:0 0 0 3px rgba(245,163,163,.2)}
.rating-btn.sel-me{background:#eef0f2;color:#000;border-color:#c3cace;box-shadow:0 0 0 3px rgba(195,202,206,.2)}
.rating-btn.sel-ex{background:#f5e6b8;color:#c9a23e;border-color:#e5be5e;box-shadow:0 0 0 3px rgba(229,190,94,.2)}
.rating-btn.sel-el{background:#1a1a1a;color:#e5be5e;border-color:#e5be5e;box-shadow:0 0 0 3px rgba(229,190,94,.2)}
.submit-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:20px 24px;background:#fff;border-radius:12px;border:1px solid #c3cace}
.btn{border:none;border-radius:8px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.3px}
.btn-gold{background:#e5be5e;color:#000}
.btn-gold:hover{background:#c9a23e}
.btn-gold:disabled{opacity:.5;cursor:not-allowed}
.alert-gold{background:rgba(229,190,94,.12);border:1px solid rgba(229,190,94,.4);border-radius:8px;padding:10px 14px;font-size:12px;color:#c9a23e;margin-bottom:14px}
.locked-banner{background:rgba(229,190,94,.1);border:1px solid rgba(229,190,94,.4);border-radius:10px;padding:12px 16px;font-size:12px;color:#c9a23e;font-weight:600;display:flex;align-items:center;gap:8px}
.flex-sb{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.footer{text-align:center;font-size:11px;color:#767b7f;padding:8px 0 16px;letter-spacing:.5px}
.breakdown-box{margin-top:14px;padding:14px;background:#eef0f2;border-radius:8px;border-left:4px solid #e5be5e}
</style>
</head>
<body>
<div class="header">
  <div class="gold-bar"></div>
  <div class="header-inner">
    <div class="logo-wrap">
      <div class="logo-box">
        <svg width="26" height="34" viewBox="0 0 26 34" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f5e6b8"/><stop offset="50%" stop-color="#e5be5e"/><stop offset="100%" stop-color="#c9a23e"/></linearGradient>
            <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f0d98a"/><stop offset="50%" stop-color="#e5be5e"/><stop offset="100%" stop-color="#c9a23e"/></linearGradient>
            <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f5e6b8"/><stop offset="100%" stop-color="#e5be5e"/></linearGradient>
          </defs>
          <polygon points="0,0 26,0 13,10" fill="url(#g1)"/>
          <polygon points="0,13 26,13 13,23" fill="url(#g2)"/>
          <polygon points="0,26 26,26 13,36" fill="url(#g3)"/>
        </svg>
      </div>
      <div>
        <h1>Axis Spine and Sport</h1>
        <p class="header-sub">CLINIC QUARTERLY PERFORMANCE REVIEW</p>
      </div>
    </div>
    <div style="text-align:right">
      <div id="headerTitle" style="font-size:13px;color:#e5be5e;font-weight:700;margin-top:2px"></div>
    </div>
  </div>
</div>

<div class="body" id="appBody"></div>

<script>
var WORKER_URL = "https://axisperformancereviewworker.drdylan.workers.dev";

var METRICS = [
  {id:"revenue",          label:"Revenue",          unit:"$", weight:0.25, tiers:{"0-3 months":90000,"3-6 months":150000,"6-9 months":240000,"9-12 months":330000,"12+ months":450000}},
  {id:"total_visits",     label:"Total Visits",     unit:"",  weight:0.20, tiers:{"0-3 months":1050,"3-6 months":1575,"6-9 months":2100,"9-12 months":2625,"12+ months":3150}},
  {id:"new_patients",     label:"New Patients",     unit:"",  weight:0.15, tiers:{"0-3 months":120,"3-6 months":180,"6-9 months":240,"9-12 months":300,"12+ months":360}},
  {id:"np_show_rate",     label:"NP Show Rate",     unit:"%", weight:0.10, staticVal:80},
  {id:"cancel_rate",      label:"Cancellation Rate",unit:"%", weight:0.10, staticVal:10, convertToShow:true},
  {id:"total_massages",   label:"Total Massages",   unit:"",  weight:0.05, tiers:{"0-3 months":90,"3-6 months":150,"6-9 months":225,"9-12 months":300,"12+ months":390}},
  {id:"google_reviews",   label:"Google Reviews",   unit:"",  weight:0.05, tiers:{"0-3 months":30,"3-6 months":60,"6-9 months":90,"9-12 months":120,"12+ months":150}},
  {id:"reexams",          label:"Re-Exams",         unit:"",  weight:0.05, tiers:{"0-3 months":45,"3-6 months":75,"6-9 months":120,"9-12 months":165,"12+ months":210}},
  {id:"rof_show_rate",    label:"ROF Show Rate",    unit:"%", weight:0.05, staticVal:80},
  {id:"transition_exams", label:"Transition Exams", unit:"",  weight:0,    tiers:{"0-3 months":15,"3-6 months":30,"6-9 months":54,"9-12 months":75,"12+ months":105}},
  {id:"rof_scheduled",    label:"ROF Scheduled Out",unit:"%", weight:0,    staticVal:50},
];

var RATINGS = ["Needs Improvement","Meets Expectations","Exceeds","Elite"];
var RATING_META = {
  "Needs Improvement":{icon:"&#9888;",cls:"sel-ni"},
  "Meets Expectations":{icon:"&#10003;",cls:"sel-me"},
  "Exceeds":{icon:"&#9733;",cls:"sel-ex"},
  "Elite":{icon:"&#127942;",cls:"sel-el"}
};
var STATUS_SCORE = {"Elite":4,"Exceeds":3,"Meets Expectations":2,"Needs Improvement":1};

var recordId = null;
var reviewData = {};
var clinicAge = null;
var isLocked = false;

function getAZDate(){
  var d = new Date(new Date().toLocaleString("en-US",{timeZone:"America/Phoenix"}));
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

var formData = {
  reviewer:"", submission_date:getAZDate(),
  metrics:{}, overall_rating:"", rating_overridden:false, override_note:"",
  wins:"", misses:"", root_cause:"", focus_next_qtr:"", owner_notes:""
};
METRICS.forEach(function(m){ formData.metrics[m.id]={actual:""}; });

var reviewers = [];

function loadReviewers(){
  return fetch(WORKER_URL+"/api/reviewers")
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.records){
        reviewers=data.records.map(function(r){
          return {
            name: r.fields["Employee Full Name"]||"",
            title: r.fields["Job Title"]||""
          };
        });
      }
    }).catch(function(){
      reviewers=[
        {name:"Irais Lopez",title:"General Manager"},
        {name:"Dylan Hernandez",title:"Owner"}
      ];
    });
}

function calcClinicAge(d){
  if(!d) return null;
  var open=new Date(d+"T00:00:00"), now=new Date();
  var mo=(now.getFullYear()-open.getFullYear())*12+(now.getMonth()-open.getMonth());
  if(mo<3)  return "0-3 months";
  if(mo<6)  return "3-6 months";
  if(mo<9)  return "6-9 months";
  if(mo<12) return "9-12 months";
  return "12+ months";
}

function resolveTarget(m,age){
  if(m.tiers) return (age&&m.tiers[age])?m.tiers[age]:null;
  return m.staticVal!=null?m.staticVal:null;
}

function formatTarget(m,age){
  var t=resolveTarget(m,age);
  if(t===null) return "—";
  if(m.unit==="$") return "$"+t.toLocaleString();
  if(m.unit==="%") return t+"%";
  return t.toLocaleString();
}

function calcPct(m,actual,age){
  var t=resolveTarget(m,age);
  if(!actual||actual===""||t===null) return null;
  var a=parseFloat(actual.toString().replace(/[$,%]/g,""));
  var tv=parseFloat(t.toString());
  if(isNaN(a)||isNaN(tv)||tv===0) return null;
  if(m.convertToShow){
    var sa=100-a, st=100-tv;
    if(st===0) return null;
    return Math.round((sa/st)*100);
  }
  return Math.round((a/tv)*100);
}

function calcStatus(m,actual,age){
  var pct=calcPct(m,actual,age);
  if(pct===null) return null;
  if(pct>=110) return "Elite";
  if(pct>=100) return "Exceeds";
  if(pct>=90)  return "Meets Expectations";
  return "Needs Improvement";
}

function pctClass(pct){
  if(pct===null) return "pct-none";
  if(pct>=110) return "pct-el";
  if(pct>=100) return "pct-ex";
  if(pct>=90)  return "pct-me";
  return "pct-ni";
}

function statusClass(st){
  return {"Elite":"badge-el","Exceeds":"badge-ex","Meets Expectations":"badge-me","Needs Improvement":"badge-ni"}[st]||"badge-none";
}

function calcWeightedScore(){
  var tw=0,ws=0;
  METRICS.forEach(function(m){
    if(!m.weight) return;
    var st=calcStatus(m,formData.metrics[m.id].actual,clinicAge);
    if(!st) return;
    ws+=STATUS_SCORE[st]*m.weight; tw+=m.weight;
  });
  return tw?ws/tw:null;
}

function scoreToRating(s){
  if(s===null) return null;
  if(s>=3.5)  return "Elite";
  if(s>=2.75) return "Exceeds";
  if(s>=2.0)  return "Meets Expectations";
  return "Needs Improvement";
}

function mk(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}
function mkCard(){return mk("div","card");}
function mkTitle(n,bg,text){
  var d=mk("div","section-title");
  d.innerHTML='<span class="sbadge" style="background:'+bg+';color:'+(bg==="#e5be5e"?"#000":"#fff")+'">'+n+'</span>'+text;
  return d;
}
function mkLbl(t){var l=mk("label","lbl");l.textContent=t;return l;}
function mkLocked(v){var d=mk("div","field-locked");d.textContent=v||"—";return d;}

function updateMetricRow(m){
  var actual=formData.metrics[m.id].actual;
  var pct=calcPct(m,actual,clinicAge);
  var st=calcStatus(m,actual,clinicAge);
  var pe=document.getElementById("pct-"+m.id);
  var se=document.getElementById("st-"+m.id);
  if(pe) pe.innerHTML='<span class="pct-cell '+pctClass(pct)+'">'+(pct!==null?pct+"%":"—")+'</span>';
  if(se) se.innerHTML='<span class="status-badge '+statusClass(st)+'">'+(st||"—")+'</span>';
}

function updateAutoRating(){
  var score=calcWeightedScore();
  var auto=scoreToRating(score);
  var box=document.getElementById("autoRatingBox");
  if(box){
    if(score!==null){
      box.innerHTML='<strong>Auto-calculated:</strong> Weighted score <strong>'+score.toFixed(2)+'</strong> &rarr; <strong>'+auto+'</strong>'
        +'<span style="margin-left:8px;font-size:10px;color:#767b7f;font-weight:400">Revenue 25% &middot; Total Visits 20% &middot; New Patients 15% &middot; NP Show 10% &middot; Cancel 10% &middot; others 5%</span>';
    } else {
      box.textContent="Enter metric actuals above to auto-calculate the overall rating.";
    }
  }
  if(!formData.rating_overridden&&auto){
    formData.overall_rating=auto;
    document.querySelectorAll(".rating-btn").forEach(function(b){
      b.className="rating-btn";
      if(b.dataset.rating===auto) b.classList.add(RATING_META[auto].cls);
    });
  }
}

function renderForm(){
  var body=document.getElementById("appBody");
  body.innerHTML="";
  var clinic=reviewData["Clinic (from Clinic)"]||reviewData["Clinic"]||"—";
  var quarter=reviewData["Quarter"]||"—";
  var year=reviewData["Year"]||"—";
  var openDate=reviewData["Opening Date (from Clinic)"]||reviewData["Opening Date"]||"";
  var openFmt=openDate?new Date(openDate+"T00:00:00").toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}):"Not on file";

  if(isLocked){
    var ban=mk("div","locked-banner");
    ban.innerHTML='<span style="font-size:16px">&#128274;</span> This review has been submitted and is locked.';
    body.appendChild(ban);
  }

  // S1
  var s1=mkCard();
  s1.appendChild(mkTitle("1","#000","Clinic Overview"));
  var g1=mk("div","info-grid");
  [{l:"Clinic",v:clinic},{l:"Opening Date",v:openFmt},{l:"Clinic Age",v:clinicAge||"Unknown"},{l:"Quarter",v:quarter},{l:"Year",v:year},{l:"Review Period",v:quarter+" "+year}].forEach(function(i){
    var w=mk("div"); w.appendChild(mkLbl(i.l)); w.appendChild(mkLocked(i.v)); g1.appendChild(w);
  });
  var rW=mk("div"); rW.appendChild(mkLbl("Reviewer"));
  var rSel=mk("select","field"); rSel.disabled=isLocked;
  var defOp=document.createElement("option"); defOp.value=""; defOp.textContent="Select reviewer…"; rSel.appendChild(defOp);
  reviewers.forEach(function(r){
    var op=document.createElement("option");
    op.value=r.name+" — "+r.title;
    op.textContent=r.name+" — "+r.title;
    if(formData.reviewer===op.value) op.selected=true;
    rSel.appendChild(op);
  });
  rSel.addEventListener("change",function(e){formData.reviewer=e.target.value;});
  rW.appendChild(rSel); g1.appendChild(rW);
  var dW=mk("div"); dW.appendChild(mkLbl("Submission Date"));
  var dInp=mk("input","field"); dInp.type="date"; dInp.value=formData.submission_date; dInp.disabled=isLocked;
  dInp.addEventListener("change",function(e){formData.submission_date=e.target.value;});
  dW.appendChild(dInp); g1.appendChild(dW);
  s1.appendChild(g1); body.appendChild(s1);

  // S2
  var s2=mkCard();
  var s2hdr=mk("div","flex-sb"); s2hdr.style.marginBottom="0";
  var s2t=mkTitle("2","#e5be5e","Clinic KPIs — Quarterly Actuals"); s2t.style.marginBottom="0";
  s2hdr.appendChild(s2t);
  var score=calcWeightedScore(), autoR=scoreToRating(score);
  if(autoR){
    var pill=mk("span","kpi-pill");
    var pc={"Elite":"background:#1a1a1a;color:#e5be5e","Exceeds":"background:#f5e6b8;color:#c9a23e","Meets Expectations":"background:#eef0f2;color:#000","Needs Improvement":"background:#fde8e8;color:#b91c1c"};
    pill.style.cssText=pc[autoR]||""; pill.textContent=autoR; s2hdr.appendChild(pill);
  }
  s2.appendChild(s2hdr);
  var note=mk("div","alert-gold");
  note.innerHTML='<strong>Status auto-calculates</strong> as you enter actuals. &nbsp;&#8805;110% = Elite &nbsp;|&nbsp; 100&#8211;110% = Exceeds &nbsp;|&nbsp; 90&#8211;99% = Meets Expectations &nbsp;|&nbsp; &lt;90% = Needs Improvement &nbsp;|&nbsp; <em>&#8595; = lower is better</em>';
  s2.appendChild(note);
  var tw=mk("div","tbl-wrap");
  var tbl=document.createElement("table");
  tbl.innerHTML='<thead><tr><th>Metric</th><th style="width:130px">Target</th><th style="width:150px">Actual</th><th style="width:90px;text-align:center">% Achieved</th><th style="width:140px;text-align:center">Status</th></tr></thead>';
  var tbody=document.createElement("tbody");
  METRICS.forEach(function(m){
    var tr=document.createElement("tr");
    var td1=mk("td"); td1.style.cssText="font-weight:600;color:#000";
    td1.textContent=m.label+(m.convertToShow?" ↓":"")+(m.weight===0?" *":"");
    var td2=mk("td");
    var t=resolveTarget(m,clinicAge);
    td2.innerHTML=t!==null?'<span class="target-pill"><span class="target-dot"></span>'+formatTarget(m,clinicAge)+'</span>':'<span style="color:#c3cace;font-size:12px;font-style:italic">—</span>';
    var td3=mk("td");
    var inp=mk("input","field");
    inp.type="text"; inp.placeholder=m.unit==="$"?"$0":m.unit==="%"?"0%":"0";
    inp.value=formData.metrics[m.id].actual||""; inp.disabled=isLocked;
    (function(metric){inp.addEventListener("input",function(e){formData.metrics[metric.id].actual=e.target.value;updateMetricRow(metric);updateAutoRating();});})(m);
    td3.appendChild(inp);
    var td4=mk("td"); td4.style.textAlign="center"; td4.id="pct-"+m.id;
    var td5=mk("td"); td5.style.textAlign="center"; td5.id="st-"+m.id;
    tr.append(td1,td2,td3,td4,td5); tbody.appendChild(tr);
  });
  tbl.appendChild(tbody); tw.appendChild(tbl); s2.appendChild(tw);
  var tn=mk("p"); tn.style.cssText="font-size:10px;color:#767b7f;margin-top:8px;font-style:italic";
  tn.textContent="* Transition Exams and ROF Scheduled Out are tracked but not weighted in the overall score.";
  s2.appendChild(tn); body.appendChild(s2);
  METRICS.forEach(function(m){updateMetricRow(m);});

  // S3
  var s3=mkCard(); s3.appendChild(mkTitle("3","#000","Quarterly Commentary"));
  var ng=mk("div","narr-grid");
  [{key:"wins",l:"Top Wins This Quarter",ph:"What went well?",r:4},
   {key:"misses",l:"Key Misses / Underperformance",ph:"Which metrics fell short?",r:4},
   {key:"root_cause",l:"Root Cause Analysis",ph:"Why did misses occur?",r:4},
   {key:"focus_next_qtr",l:"Focus Areas — Next Quarter",ph:"Top 2–3 priorities…",r:4},
   {key:"owner_notes",l:"Notes for Ownership",ph:"Anything ownership should know…",r:3}
  ].forEach(function(i){
    var w=mk("div"); w.appendChild(mkLbl(i.l));
    var ta=mk("textarea","field"); ta.placeholder=i.ph; ta.rows=i.r; ta.value=formData[i.key]||""; ta.disabled=isLocked;
    (function(k){ta.addEventListener("input",function(e){formData[k]=e.target.value;});})(i.key);
    w.appendChild(ta); ng.appendChild(w);
  });
  s3.appendChild(ng); body.appendChild(s3);

  // S4
  var s4=mkCard(); s4.appendChild(mkTitle("4","#000","Overall Clinic Rating"));
  var autoBox=mk("div","alert-gold"); autoBox.id="autoRatingBox";
  var sc2=calcWeightedScore(), ar2=scoreToRating(sc2);
  autoBox.innerHTML=ar2
    ?'<strong>Auto-calculated:</strong> Weighted score <strong>'+sc2.toFixed(2)+'</strong> &rarr; <strong>'+ar2+'</strong><span style="margin-left:8px;font-size:10px;color:#767b7f;font-weight:400">Revenue 25% &middot; Total Visits 20% &middot; New Patients 15% &middot; NP Show 10% &middot; Cancel 10% &middot; others 5%</span>'
    :"Enter metric actuals above to auto-calculate the overall rating.";
  s4.appendChild(autoBox);
  var rg=mk("div","rating-grid");
  var activeRating=formData.overall_rating||ar2;
  RATINGS.forEach(function(rv){
    var meta=RATING_META[rv];
    var b=mk("button","rating-btn"); b.dataset.rating=rv; b.disabled=isLocked;
    if(activeRating===rv) b.classList.add(meta.cls);
    var isAuto=(rv===ar2&&!formData.rating_overridden);
    b.innerHTML='<span style="margin-right:6px">'+meta.icon+'</span>'+rv+(isAuto?'<br><span style="font-size:9px;opacity:.6">AUTO</span>':'');
    (function(rating){b.onclick=function(){
      if(rating===ar2){formData.overall_rating=rating;formData.rating_overridden=false;formData.override_note="";}
      else{formData.overall_rating=rating;formData.rating_overridden=true;}
      renderForm();
    };})(rv);
    rg.appendChild(b);
  });
  s4.appendChild(rg);
  if(formData.rating_overridden&&formData.overall_rating){
    var ovW=mk("div"); ovW.style.marginTop="14px"; ovW.appendChild(mkLbl("Override Reason *"));
    var ovTa=mk("textarea","field"); ovTa.placeholder="Explain why the rating differs from auto-calculated…"; ovTa.rows=3;
    ovTa.value=formData.override_note||""; ovTa.disabled=isLocked;
    ovTa.addEventListener("input",function(e){formData.override_note=e.target.value;});
    ovW.appendChild(ovTa); s4.appendChild(ovW);
  }
  if(sc2!==null){
    var bd=mk("div","breakdown-box");
    var rows=METRICS.filter(function(m){return m.weight>0;}).map(function(m){
      var st=calcStatus(m,formData.metrics[m.id].actual,clinicAge);
      var sc3=st?STATUS_SCORE[st]:null;
      return '<span style="font-size:11px;color:#767b7f">'+m.label+': <strong style="color:#000">'+(st||"—")+'</strong> &times;'+(m.weight*100).toFixed(0)+'% = <strong style="color:#000">'+(sc3!==null?(sc3*m.weight).toFixed(3):"—")+'</strong></span>';
    }).join('<span style="color:#c3cace;margin:0 4px">|</span>');
    bd.innerHTML='<div style="font-size:11px;font-weight:700;color:#000;margin-bottom:6px">Score Breakdown</div><div style="display:flex;flex-wrap:wrap;gap:6px;line-height:2.2">'+rows+'</div>';
    s4.appendChild(bd);
  }
  body.appendChild(s4);

  // Submit
  var sub=mk("div","submit-bar");
  var subL=mk("div"); subL.style.cssText="display:flex;flex-direction:column;gap:4px";
  subL.innerHTML=isLocked
    ?'<div style="font-size:13px;font-weight:700;color:#1a7a3a">&#10003; Review Submitted</div><div style="font-size:11px;color:#767b7f">This review has been completed and locked.</div>'
    :'<div style="font-size:13px;font-weight:700;color:#000">Ready to Submit?</div><div style="font-size:11px;color:#767b7f">Syncs completed review to Airtable.</div>';
  var subR=mk("div"); subR.style.cssText="display:flex;align-items:center;gap:12px;flex-wrap:wrap";
  var msgEl=mk("span"); msgEl.style.cssText="font-size:12px;font-weight:600;display:none";
  var submitBtn=mk("button","btn btn-gold");
  submitBtn.textContent=isLocked?"Submitted":"Submit Review"; submitBtn.disabled=isLocked;
  submitBtn.onclick=function(){handleSubmit(submitBtn,msgEl);};
  subR.appendChild(msgEl); subR.appendChild(submitBtn);
  sub.appendChild(subL); sub.appendChild(subR); body.appendChild(sub);

  var ft=mk("div","footer");
  ft.innerHTML='<span style="color:#e5be5e;font-weight:800">AXIS SPINE AND SPORT</span><span style="margin:0 8px;color:#c3cace">|</span>Clinic Quarterly Review v2.1';
  body.appendChild(ft);
}

function handleSubmit(btn,msgEl){
  if(!formData.reviewer){showMsg(msgEl,"Please select a reviewer.","#b91c1c");return;}
  if(!formData.overall_rating){showMsg(msgEl,"Please select an overall rating.","#b91c1c");return;}
  if(formData.rating_overridden&&!formData.override_note){showMsg(msgEl,"Please provide an override reason.","#b91c1c");return;}
  btn.disabled=true; btn.textContent="Submitting…";
  var score=calcWeightedScore();
  var payload={
    "Reviewer":formData.reviewer,
    "Submission Date":formData.submission_date,
    "Submitted At":new Date().toISOString(),
    "Status":"Completed",
    "Overall Rating":formData.overall_rating,
    "Rating Overridden":formData.rating_overridden?"Yes":"No",
    "Override Reason":formData.override_note||"",
    "Weighted Score":score?parseFloat(score.toFixed(2)):null,
    "Wins This Quarter":formData.wins,
    "Key Misses":formData.misses,
    "Root Cause":formData.root_cause,
    "Focus — Next Quarter":formData.focus_next_qtr,
    "Notes for Ownership":formData.owner_notes
  };
  METRICS.forEach(function(m){
    var actual=formData.metrics[m.id].actual;
    payload[m.label+" — Actual"]=actual;
    payload[m.label+" — Target"]=formatTarget(m,clinicAge);
    payload[m.label+" — Status"]=calcStatus(m,actual,clinicAge)||"";
    payload[m.label+" — % Achieved"]=calcPct(m,actual,clinicAge)||"";
  });
  fetch(WORKER_URL+"/api/quarterly-review",{
    method:"PATCH",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({recordId:recordId,fields:payload})
  }).then(function(r){return r.json();}).then(function(result){
    if(result.id){
      showMsg(msgEl,"Submitted — Airtable updated.","#1a7a3a");
      btn.textContent="Submitted";
      btn.style.cssText="background:#e6f4ea;color:#1a7a3a;border:none;border-radius:8px;padding:10px 24px;font-size:13px;font-weight:700";
      isLocked=true;
    } else { throw new Error(); }
  }).catch(function(){
    showMsg(msgEl,"Sync failed — check Worker logs.","#b91c1c");
    btn.disabled=false; btn.textContent="Submit Review";
  });
}

function showMsg(el,text,color){el.style.display="inline";el.style.color=color;el.textContent=text;}

function showError(msg){
  var body=document.getElementById("appBody"); body.innerHTML='';
  var card=mk("div","card"); card.style.cssText="text-align:center;padding:60px 40px";
  card.innerHTML='<div style="font-size:32px;margin-bottom:16px">&#9888;</div><div style="font-size:15px;font-weight:700;color:#000;margin-bottom:8px">Unable to Load Review</div><div style="font-size:13px;color:#767b7f;max-width:400px;margin:0 auto">'+msg+'</div>';
  body.appendChild(card);
  document.getElementById("headerTitle").textContent="Error";
}

(function(){
  recordId=getParam("recordId");
  if(recordId){
    Promise.all([
      fetch(WORKER_URL+"/api/quarterly-review?recordId="+recordId).then(function(r){return r.json();}),
      loadReviewers()
    ]).then(function(results){
      var data=results[0];
      if(data.fields){
        reviewData=data.fields;
        clinicAge=calcClinicAge(data.fields["Opening Date (from Clinic)"]||data.fields["Opening Date"]);
        isLocked=data.fields["Status"]==="Completed";
        document.getElementById("headerTitle").textContent=
          (data.fields["Clinic (from Clinic)"]||data.fields["Clinic"]||"")+" — "+data.fields["Quarter"]+" "+data.fields["Year"];
        renderForm();
      } else {
        showError("Record not found. Please open this form from the Airtable button.");
      }
    }).catch(function(){
      showError("Unable to load review. Please check your connection and try again.");
    });
  } else {
    showError("No review record specified. Please open this form from the Airtable scorecard button.");
  }
})();
</script>
</body>
</html>
